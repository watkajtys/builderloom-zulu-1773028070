                        body: JSON.stringify({ note: steerNote })

                                                </div>
                                                <div className="p-6">
                                                    <p className="text-[11px] text-[#f8fafc] font-mono whitespace-pre-wrap leading-relaxed border-l-2 border-amber-500/30 pl-4">{iter.architectural_critique}</p>
                                                </div>
                                            </div>
                                        )}

                                        {isExpanded && state.repo_memory?.learnings?.find(l => l.iteration === iter.id) && (
                                            <div className="bg-[#111111] border border-[#00f2ff]/30 rounded-xl overflow-hidden shadow-lg mt-8 animate-in fade-in slide-in-from-top-4">
                                                <div className="bg-[#00f2ff]/20 p-4 border-b border-[#00f2ff]/20 flex justify-between items-center">
                                                    <h3 className="text-[10px] font-bold text-[#00f2ff] uppercase tracking-widest flex items-center gap-2">
                                                        Technical Learnings
                                                    </h3>
                                                </div>
                                                <div className="p-6">
                                                    <p className="text-[11px] text-[#f8fafc] font-mono whitespace-pre-wrap leading-relaxed border-l-2 border-[#00f2ff]/30 pl-4">
                                                        {state.repo_memory.learnings.find(l => l.iteration === iter.id).takeaways}
                                                    </p>
                                                </div>
                                            </div>
                                        )}

                                        {iter.id === state.current_iteration && state.active_jules_prompt && (
                                            <div className="bg-[#050505] border border-[#00f2ff]/30 rounded-xl overflow-hidden shadow-[0_0_20px_rgba(59,130,246,0.1)]">
                                                <div className="bg-[#111111] px-4 py-2 border-b border-[#1e1e26] flex items-center justify-between">
                                                    <div className="flex items-center gap-3">
                                                        <div className="spinner border-[#00f2ff] w-3 h-3 border-2"></div>
                                                        <h3 className="text-[10px] font-bold text-[#00f2ff] uppercase tracking-widest">JULES IS CODING</h3>
                                                    </div>
                                                    <a href={state.active_jules_url} target="_blank" rel="noopener noreferrer" className="text-[9px] text-[#00f2ff] hover:text-[#00f2ff] font-mono flex items-center gap-1 bg-[#00f2ff]/10 px-2 py-0.5 rounded transition-colors">
                                                        <span>View Console</span>
                                                        <span className="text-[7px]">↗</span>
                                                    </a>
                                                </div>
                                                <div className="p-4 font-mono text-[11px] text-[#00f2ff] leading-relaxed bg-[#0d1117]">
                                                    <span className="text-[#71717a] select-none mr-2">jules$</span>
                                                    <span className="animate-pulse">{state.active_jules_action || "Initializing task..."}</span>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    );
                                })}
                            </div>
                        </main>
                        )}
                    </div>

                    <div className="h-64 shrink-0 bg-[#0a0a0a] border-t border-[#1e1e26] flex flex-col overflow-hidden">
                        <div className="px-6 py-2 border-b border-[#1e1e26]/50 bg-[#111111]/30 flex items-center justify-between shrink-0">
                            <div className="flex items-center gap-4">
                                <span className="text-[10px] font-bold text-[#71717a] uppercase tracking-widest">System Logs</span>
                                <div className="flex gap-1">
                                    {['all', 'error', 'jules', 'brain'].map(f => (
                                        <button 
                                            key={f}
                                            onClick={() => setLogFilter(f)}
                                            className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase transition-all ${logFilter === f ? 'bg-[#00f2ff] text-white' : 'bg-[#1e1e26] text-[#71717a] hover:bg-[#1e1e26]'}`}
                                        >
                                            {f}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            {state.db_stats && Object.keys(state.db_stats).length > 0 && (
                                <div className="flex items-center gap-3">
                                    <span className="text-[10px] font-bold text-[#71717a] uppercase tracking-widest mr-1">Data Soul:</span>
                                    {Object.entries(state.db_stats).map(([col, count]) => (
                                        <div key={col} className="text-[9px] font-mono text-[#71717a] bg-[#1e1e26]/50 px-2 py-0.5 rounded border border-[#1e1e26]/30">
                                            {col}: <span className="text-[#00f2ff] font-bold">{count}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <div className="flex-1 p-6 font-mono text-[11px] overflow-y-auto" onScroll={(e) => isScrolledUpLogs.current = e.target.scrollHeight - e.target.scrollTop - e.target.clientHeight > 50} ref={logContainerRef}>
                            <div className="space-y-1.5 pb-4">
                                {state.live_logs?.filter(log => {
                                    if (logFilter === 'error') return log.includes("ERROR");
                                    if (logFilter === 'jules') return log.includes("Jules");
                                    if (logFilter === 'brain') return log.includes("Overseer") || log.includes("Think");
                                    return true;
                                }).map((log, i) => (
                                    <div key={i} className={`flex gap-3 leading-relaxed ${log.includes("ERROR") ? "text-red-400" : log.includes("Jules") ? "text-[#00f2ff]" : log.includes("Stitch") ? "text-[#bc13fe]" : "text-[#71717a]"}`}>
                                        <span className="text-[#71717a] select-none">❯</span>
                                        <span className="break-all">{log}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
